<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Text Messenger</title>
<style>
:root{--bg:#0d1117;--panel:#151b25;--soft:#202938;--line:#2d3748;--text:#eef4ff;--muted:#a9b5c8;--accent:#70d6a7;--mine:#195c70;--danger:#ff8f8f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.auth{min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:min(420px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 18px 55px #0005}h1{font-size:23px;margin:0 0 8px}.sub{color:var(--muted);line-height:1.45;margin:0 0 20px}label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}input,textarea{width:100%;border:1px solid var(--line);background:#10151f;color:var(--text);border-radius:10px;padding:11px 12px;outline:none}input:focus,textarea:focus{border-color:var(--accent)}.primary{margin-top:16px;width:100%;padding:11px 14px;border:0;border-radius:10px;background:var(--accent);color:#071624;font-weight:700}.switch{background:none;color:var(--accent);border:0;padding:0}.error{min-height:20px;color:var(--danger);font-size:14px;margin-top:12px}.app{height:100vh;display:grid;grid-template-columns:300px 1fr}aside{border-right:1px solid var(--line);background:var(--panel);min-width:0;display:flex;flex-direction:column}.side-head{padding:16px;border-bottom:1px solid var(--line)}.identity{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14px;color:var(--muted)}.identity strong{color:var(--text)}.logout{background:none;border:0;color:var(--muted);padding:3px}.new-chat{display:flex;gap:7px;margin-top:14px}.new-chat input{min-width:0;padding:9px}.new-chat button{border:0;border-radius:9px;background:var(--soft);color:var(--text);padding:0 12px}#chatList{overflow:auto;padding:8px}.chat-row{width:100%;text-align:left;border:0;border-radius:10px;background:transparent;color:var(--text);padding:11px;margin-bottom:3px}.chat-row:hover,.chat-row.active{background:var(--soft)}.chat-title{display:block;font-weight:700;margin-bottom:4px}.chat-preview{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}main{min-width:0;display:flex;flex-direction:column}.empty{flex:1;display:grid;place-items:center;color:var(--muted);padding:24px;text-align:center}.chat-head{padding:15px 20px;border-bottom:1px solid var(--line);font-weight:700}#messages{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:10px}.message{max-width:min(75%,650px);padding:9px 11px;border-radius:12px;background:var(--soft);white-space:pre-wrap;overflow-wrap:anywhere}.message.mine{align-self:flex-end;background:var(--mine)}.meta{font-size:11px;color:#c5d1e0;opacity:.85;margin-top:4px}.composer{border-top:1px solid var(--line);display:flex;gap:10px;padding:12px}.composer textarea{resize:none;height:47px}.composer button{width:90px;border:0;border-radius:10px;background:var(--accent);color:#071624;font-weight:700}.notice{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#293347;padding:9px 13px;border-radius:9px;border:1px solid var(--line);display:none;max-width:90vw}.status{font-size:12px;color:var(--muted);margin-top:8px}.status.bad{color:var(--danger)}@media(max-width:700px){.app{grid-template-columns:110px 1fr}.side-head{padding:11px 8px}.identity{font-size:0}.identity strong{font-size:13px}.new-chat{display:block}.new-chat button{width:100%;height:34px;margin-top:6px}.chat-preview{display:none}.chat-row{padding:10px 6px;text-align:center}.chat-title{font-size:12px;overflow:hidden;text-overflow:ellipsis}.message{max-width:88%}}
</style>
</head>
<body><div id="root"></div><div id="notice" class="notice"></div>
<script>
/* Replace only this line after you deploy Code.gs as a Web App. */
const DIRECTORY_URL = 'https://script.google.com/macros/s/AKfycbykxqc8MS9C41DhUJCFcGEkF9vtyx-SRe2qImfrtqRhQXkQgWnr_DP1ndC-a_5DfC9YFw/exec';
const TOKEN_KEY = 'text_messenger_token_v1';
let apiBase='', token=localStorage.getItem(TOKEN_KEY)||'', me=null, activePeer=null, activeMessages=[];
const root=document.getElementById('root'), $=s=>document.querySelector(s);
const escapeHtml=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function notice(t){const e=$('#notice');e.textContent=t;e.style.display='block';clearTimeout(window.nt);window.nt=setTimeout(()=>e.style.display='none',3500)}
function directoryJsonp(){return new Promise((resolve,reject)=>{if(!DIRECTORY_URL.startsWith('https://'))return reject(new Error('В index.html не указан DIRECTORY_URL.'));const cb='directoryCallback_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');const timer=setTimeout(()=>clean(new Error('Не удалось получить адрес сервера.')),12000);function clean(err,data){clearTimeout(timer);delete window[cb];s.remove();err?reject(err):resolve(data)}window[cb]=data=>clean(null,data);s.onerror=()=>clean(new Error('Directory недоступен.'));s.src=DIRECTORY_URL+(DIRECTORY_URL.includes('?')?'&':'?')+'callback='+cb+'&_='+Date.now();document.head.appendChild(s)})}
async function refreshApiBase(){const d=await directoryJsonp();const next=(d.tunnelUrl||'').replace(/\/$/,'');if(!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/i.test(next))throw new Error('Сервер сейчас не запущен.');const changed=next!==apiBase;apiBase=next;if(changed&&me){notice('Сервер переподключён.');await restoreSession()}return changed}
async function api(path,options={}){if(!apiBase)await refreshApiBase();const headers={'Content-Type':'application/json',...(options.headers||{})};if(token)headers.Authorization='Bearer '+token;const r=await fetch(apiBase+path,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Ошибка сервера');return d}
function authScreen(mode='login'){root.innerHTML=`<div class="auth"><section class="card"><h1>Text Messenger</h1><p class="sub">Личные сообщения в браузере. В диалоге сохраняются только последние 22 сообщения.</p><form id="authForm"><label>Username</label><input id="username" autocomplete="username" placeholder="например, georgiy_1" required><label>Пароль</label><input id="password" type="password" autocomplete="current-password" required><button class="primary">${mode==='login'?'Войти':'Создать аккаунт'}</button></form><p class="sub" style="margin:15px 0 0">${mode==='login'?'Нет аккаунта?':'Уже есть аккаунт?'} <button class="switch" id="switchMode">${mode==='login'?'Регистрация':'Войти'}</button></p><div class="error" id="authError"></div><div id="serverStatus" class="status">Проверяю сервер…</div></section></div>`;$('#switchMode').onclick=()=>authScreen(mode==='login'?'register':'login');checkDirectoryStatus();$('#authForm').onsubmit=async e=>{e.preventDefault();try{const d=await api('/api/'+(mode==='login'?'login':'register'),{method:'POST',body:JSON.stringify({username:$('#username').value,password:$('#password').value})});token=d.token;localStorage.setItem(TOKEN_KEY,token);me=d.user;startApp()}catch(err){$('#authError').textContent=err.message}}}
async function checkDirectoryStatus(){try{await refreshApiBase();const e=$('#serverStatus');if(e)e.textContent='Сервер подключён.'}catch(err){const e=$('#serverStatus');if(e){e.textContent=err.message;e.className='status bad'}}}
function appScreen(){root.innerHTML=`<div class="app"><aside><div class="side-head"><div class="identity"><span>Вы: <strong>${escapeHtml(me.username)}</strong></span><button class="logout" id="logout">Выйти</button></div><form class="new-chat" id="newChat"><input id="peerInput" placeholder="username друга" required><button>Открыть</button></form></div><div id="chatList"></div></aside><main id="main"><div class="empty">Выбери существующий чат или введи username друга слева.</div></main></div>`;$('#logout').onclick=async()=>{try{await api('/api/logout',{method:'POST'})}catch(_){}token='';localStorage.removeItem(TOKEN_KEY);me=null;activePeer=null;authScreen()};$('#newChat').onsubmit=async e=>{e.preventDefault();const n=$('#peerInput').value.trim();if(n)await openChat(n)}}
async function loadChats(){const d=await api('/api/chats');const list=$('#chatList');list.innerHTML=d.chats.length?d.chats.map(c=>`<button class="chat-row ${activePeer===c.username?'active':''}" data-name="${escapeHtml(c.username)}"><span class="chat-title">${escapeHtml(c.username)}</span><span class="chat-preview">${escapeHtml(c.last_body)}</span></button>`).join(''):'<div class="sub" style="padding:12px">Пока нет диалогов.</div>';document.querySelectorAll('.chat-row').forEach(b=>b.onclick=()=>openChat(b.dataset.name))}
function renderChat(){if(!activePeer)return;$('#main').innerHTML=`<div class="chat-head">${escapeHtml(activePeer)}</div><div id="messages"></div><form class="composer" id="composer"><textarea id="messageText" maxlength="4000" placeholder="Напиши сообщение…" required></textarea><button>Отправить</button></form>`;renderMessages();$('#composer').onsubmit=async e=>{e.preventDefault();const box=$('#messageText'),body=box.value.trim();if(!body)return;try{const d=await api('/api/messages/'+encodeURIComponent(activePeer),{method:'POST',body:JSON.stringify({body})});box.value='';activeMessages.push(d.message);if(activeMessages.length>22)activeMessages.shift();renderMessages();loadChats()}catch(err){notice(err.message)}}}
function renderMessages(){const box=$('#messages');if(!box)return;box.innerHTML=activeMessages.map(m=>`<div class="message ${m.sender_id===me.id?'mine':''}">${escapeHtml(m.body)}<div class="meta">${m.sender_id===me.id?'Вы':escapeHtml(m.sender_username)} · ${new Date(m.created_at).toLocaleString()}</div></div>`).join('');box.scrollTop=box.scrollHeight}
async function openChat(name){try{const d=await api('/api/messages/'+encodeURIComponent(name));activePeer=d.peer.username;activeMessages=d.messages;$('#peerInput').value='';renderChat();loadChats()}catch(err){notice(err.message)}}
async function pollMessages(){if(!activePeer)return;try{const d=await api('/api/messages/'+encodeURIComponent(activePeer));const old=activeMessages.map(x=>x.id).join(',');const next=d.messages.map(x=>x.id).join(',');activeMessages=d.messages;if(old!==next)renderMessages();loadChats()}catch(_) {}}
async function restoreSession(){if(!token){authScreen();return}try{const d=await api('/api/me');if(!d.user)throw Error();me=d.user;if(!$('#root .app')){appScreen();await loadChats()}}catch(_){token='';localStorage.removeItem(TOKEN_KEY);me=null;authScreen()}}
async function startApp(){appScreen();await loadChats();clearInterval(window.msgPoll);window.msgPoll=setInterval(pollMessages,5000)}
(async()=>{try{await refreshApiBase();await restoreSession()}catch(err){authScreen();setTimeout(checkDirectoryStatus,0)}})();
setInterval(async()=>{try{await refreshApiBase()}catch(_){/* the server may be temporarily off */}},60000);
</script></body></html>
